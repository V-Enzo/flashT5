# @package _global_

# Experiment args
mode: 'ft'
device: gpu
precision: 'bf16'
eval_only: false
predict_only: false
load_all: false
seed: 2137
id: 222


task:
  type: 'classification' # 'classification' or 'generation'
  # type: 'generation'
  # dataset: 'USTC-TFC2016'
  # dataset: 'VPN'
  # name: ''
  # name: 'DoHbrw Attack Detection'         # Task 12-2 classes
  # name: 'DoHbrw Query Generator Detection' # Task 13-5 classes
  name: 'VPN Application Classification' # Task 3-17 classes
  # name: 'VPN Service Classification'   # Task 2-6 classes
  # name: 'VPN Detection'                # Task 1-2 classes
  # name: 'USTC-tfc2016 APP Detection'           # Task 7-20 classes
  # name: 'USTC-tfc2016 Malware Detection'       # Task 6-2 classes
  # name: 'IoT Method Detection'         # Task 15-8 classes
  # name: 'IoT Malicious Detection'      # Task 14-2 classes
  # name: 'Tor Service Detection'        # Task 5-7 classes
  # name: 'Tor Detection'                # Task 4-2 classes
  # name: 'CrossPlatform Android APP Classification' # Task 8-209 classes
  # name: 'CrossPlatform Android APP Country Detection' # Task 9-3 classes
  # name: 'CrossPlatform IOS APP Classification'   # Task 10-212 classes
  # name: 'CrossPlatform IOS APP Country Detection'# Task 11-3 classes
  # name: 'Generation All' 
  # name: 'Generation Port Len' 
  # name: 'Source Port Generation'
  # name: 'Destination Port Generation'
  # name: 'Packet Length Generation'
  # name: 'Source IP Generation'
  # name: 'Destination IP Generation'
  level: 'pkt' # 'pkt' or 'flow'
  refine: 'unlimit' # 'unlimit' or 'limit'
model:
  klass: local_t5
  name: 'google/t5-v1_1-base'
  overwrite:
    dropout_rate: 0.0
    vocab_size: 65537 # 66118
  add_config:
    is_bf16: true
  checkpoint_path: ''
  restore_path: '/home/charles/Desktop/Lens0714/lens_v1/ckpt/charles_flash_attn_msp_ckpt/checkpoint-pt-65000'
  # '/home/charles/Desktop/Lens0714/lens_v1/ckpt/qineng_pt-ckpt/checkpoint-pt-100001' # pre-trained by Qineng without crossplatform.
  
  # '/data/lcharles/CHECKPOINTS/FlashLens/netbench_v9_pretrain-flow/2024-06-28/19-05-11/checkpoint-pt-95000'
  # '/data2/charles/Linear_Lens/logs/2024-06-24/13-13-47-/checkpoint-pt-15000'
  # '/data2/charles/Linear_Lens/logs/2024-06-21/04-15-34-/checkpoint-pt-200000' # ckpt 500k
  # '/data2/charles/Linear_Lens/logs/2024-06-24/13-13-47-/checkpoint-pt-15000'
  # '/data2/charles/Linear_Lens/logs/2024-06-24/13-13-47-/checkpoint-pt-24000'
  # '/data2/charles/Linear_Lens/logs/2024-06-24/13-13-47-/checkpoint-pt-6000'
  # '/data2/charles/Linear_Lens/logs/2024-06-13/04-50-42-/checkpoint-pt-300000'
  random_init: true
  compile: true # Pytorch 2.0
  pkt_token_id: 4

data:
  base_dir: '/home/charles/Desktop/Lens0714/lens_v1'
  tokenizer_path: '/home/charles/Desktop/Lens0714/tokenizer/NetT5WordPiece65536'
  input_length: 512
  mlm_probability: 0.15
  mean_noise_span_length: 3.0
  num_workers: 0

optim:
  name: adamw
  base_lr: 3e-5 #
  batch_size: 100 # if 2, then means for eval test, 128 for faster eval result.
  total_steps: 40000 # 65536 for one, 32768 for four, 12200 default
  epochs: 0 # If it's > 0 it overwrites total_steps
  warmup_steps: 0
  lr_scheduler: constant
  weight_decay: 0.0
  grad_clip: 1.0
  grad_acc: 4
  loss_type: 'CE'
  current_epoch: 0
  # final_cosine: 1e-5

eval:
  every_steps: 5000 # Eval once in the end
  steps: 5000
  eval_epochs: 1

checkpoint:
  every_steps: 10000 # Save checkpoint once in the end

logging:
  wandb: true
  neptune: false
  neptune_creds:
    project:
    api_token:
    tags: ''
  every_steps: 50
  grad_l2: true
  weights_l2: true

